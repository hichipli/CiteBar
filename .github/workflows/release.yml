name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.3.1)'
        required: true
        type: string
      dry_run:
        description: 'Build, sign, notarize, and upload artifacts without publishing a GitHub Release'
        required: false
        default: true
        type: boolean

# Grant GITHUB_TOKEN the permissions required to make releases
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: 'latest-stable'
        
    - name: Check Swift version
      run: |
        swift --version
        echo "Xcode version:"
        xcodebuild -version
        
    - name: Get version
      id: get_version
      run: |
        if [ "${{ github.event.inputs.version }}" != "" ]; then
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          echo "TAG=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        fi

    - name: Validate Sparkle signing configuration
      env:
        SPARKLE_PUBLIC_ED_KEY_VAR: ${{ vars.SPARKLE_PUBLIC_ED_KEY }}
        SPARKLE_PUBLIC_ED_KEY_SECRET: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
        SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
      run: |
        PUBLIC_ED_KEY="${SPARKLE_PUBLIC_ED_KEY_VAR:-$SPARKLE_PUBLIC_ED_KEY_SECRET}"
        
        if [ -z "$PUBLIC_ED_KEY" ]; then
          echo "Error: Missing Sparkle public key."
          echo "Set repository variable or secret: SPARKLE_PUBLIC_ED_KEY"
          exit 1
        fi
        
        if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
          echo "Error: Missing Sparkle private key."
          echo "Set repository secret: SPARKLE_PRIVATE_KEY"
          exit 1
        fi
        
        echo "SPARKLE_PUBLIC_ED_KEY=$PUBLIC_ED_KEY" >> $GITHUB_ENV

    - name: Validate Apple signing configuration
      env:
        DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
        MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
      run: |
        missing=0
        for name in DEVELOPER_ID_APPLICATION MACOS_CERTIFICATE_P12 MACOS_CERTIFICATE_PASSWORD APPLE_ID APPLE_TEAM_ID APP_SPECIFIC_PASSWORD; do
          if [ -z "${!name}" ]; then
            echo "Error: Missing GitHub secret: $name"
            missing=1
          fi
        done

        if [ "$missing" -ne 0 ]; then
          exit 1
        fi

    - name: Import Developer ID certificate
      env:
        DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
        MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      run: |
        CERTIFICATE_PATH="$RUNNER_TEMP/developer_id_application.p12"
        KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
        KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-temporary-password-${{ github.run_id }}}"

        echo "$MACOS_CERTIFICATE_P12" | base64 --decode > "$CERTIFICATE_PATH"

        security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')
        security default-keychain -s "$KEYCHAIN_PATH"
        security import "$CERTIFICATE_PATH" -k "$KEYCHAIN_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security find-identity -v -p codesigning "$KEYCHAIN_PATH"

        if ! security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -F "$DEVELOPER_ID_APPLICATION"; then
          echo "Error: Developer ID identity not found in keychain: $DEVELOPER_ID_APPLICATION"
          exit 1
        fi
        
    - name: Update version in code
      run: |
        VERSION="${{ steps.get_version.outputs.VERSION }}"
        sed -i '' "s/static let current: String = \".*\"/static let current: String = \"$VERSION\"/" Sources/CiteBar/AppVersion.swift
        BUILD_NUMBER=$(date +%s)
        sed -i '' "s/static let build: String = \".*\"/static let build: String = \"$BUILD_NUMBER\"/" Sources/CiteBar/AppVersion.swift
        
    - name: Calculate DMG name (same as Makefile)
      id: dmg_name
      run: |
        # Extract version from AppVersion.swift (same as Makefile)
        VERSION=$(grep 'static let current' Sources/CiteBar/AppVersion.swift | cut -d'"' -f2)
        BUILD_VERSION=$(grep 'static let build' Sources/CiteBar/AppVersion.swift | cut -d'"' -f2)
        MANUAL_UPGRADE_BASELINE_BUILD=$(grep 'static let sparkleManualUpgradeBaselineBuild' Sources/CiteBar/AppVersion.swift | cut -d'"' -f2)
        
        # Release artifacts are universal binaries (arm64 + x86_64)
        ARCH_NAME="universal"
        BUILD_DATE=$(date +%Y%m%d)
        DMG_NAME="CiteBar-${VERSION}-${ARCH_NAME}-${BUILD_DATE}"
        
        echo "VERSION_FROM_FILE=$VERSION" >> $GITHUB_OUTPUT
        echo "BUILD_VERSION_FROM_FILE=$BUILD_VERSION" >> $GITHUB_OUTPUT
        echo "MANUAL_UPGRADE_BASELINE_BUILD_FROM_FILE=$MANUAL_UPGRADE_BASELINE_BUILD" >> $GITHUB_OUTPUT
        echo "ARCH_NAME=$ARCH_NAME" >> $GITHUB_OUTPUT
        echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_OUTPUT
        echo "DMG_NAME=$DMG_NAME" >> $GITHUB_OUTPUT
        
        echo "Calculated DMG name: $DMG_NAME"
        echo "Version from file: $VERSION"
        echo "Build version from file: $BUILD_VERSION"
        echo "Manual upgrade baseline build: $MANUAL_UPGRADE_BASELINE_BUILD"
        
    - name: Build and Package
      run: |
        # Verify version was updated correctly
        UPDATED_VERSION=$(grep 'static let current' Sources/CiteBar/AppVersion.swift | cut -d'"' -f2)
        echo "Updated version in code: $UPDATED_VERSION"
        echo "Expected version: ${{ steps.get_version.outputs.VERSION }}"
        echo "DMG name will be: ${{ steps.dmg_name.outputs.DMG_NAME }}"
        
        # Create properly configured app bundle with Sparkle framework, rpath fixes, and signing
        make package
      env:
        SPARKLE_PUBLIC_ED_KEY: ${{ env.SPARKLE_PUBLIC_ED_KEY }}
        SIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        
    - name: Create DMG
      run: |
        # Use Makefile to create DMG (it will handle everything properly)
        make dmg
        
        # Get the actual DMG file created by Makefile
        MAKEFILE_DMG=$(ls dist/*.dmg | head -1)
        EXPECTED_DMG="dist/${{ steps.dmg_name.outputs.DMG_NAME }}.dmg"
        
        echo "Makefile created: $MAKEFILE_DMG"
        echo "Expected filename: $EXPECTED_DMG"
        
        if [ "$MAKEFILE_DMG" != "$EXPECTED_DMG" ]; then
          mv "$MAKEFILE_DMG" "$EXPECTED_DMG"
          echo "Renamed DMG: $MAKEFILE_DMG -> $EXPECTED_DMG"
        else
          echo "DMG filename is already correct"
        fi
        
        # Verify the final DMG exists
        if [ ! -f "$EXPECTED_DMG" ]; then
          echo "Error: Expected DMG file not found: $EXPECTED_DMG"
          echo "Available files in dist/:"
          ls -la dist/
          exit 1
        fi
      env:
        SPARKLE_PUBLIC_ED_KEY: ${{ env.SPARKLE_PUBLIC_ED_KEY }}
        SIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_APPLICATION }}

    - name: Capture signing diagnostics
      run: |
        set -o pipefail
        mkdir -p dist/notary-logs
        {
          echo "DMG:"
          ls -lh "dist/${{ steps.dmg_name.outputs.DMG_NAME }}.dmg"
          codesign --verify --verbose=4 "dist/${{ steps.dmg_name.outputs.DMG_NAME }}.dmg"
          codesign -dv --verbose=4 "dist/${{ steps.dmg_name.outputs.DMG_NAME }}.dmg"
          echo
          echo "App bundle verification:"
          codesign --verify --strict --deep --verbose=4 dist/CiteBar.app
          echo
          echo "Main executable verification:"
          codesign --verify --strict --verbose=4 dist/CiteBar.app/Contents/MacOS/CiteBar
          codesign -dv --verbose=4 dist/CiteBar.app/Contents/MacOS/CiteBar
          echo
          echo "Sparkle framework binary verification:"
          codesign --verify --strict --verbose=4 dist/CiteBar.app/Contents/Frameworks/Sparkle.framework/Versions/B/Sparkle
          codesign -dv --verbose=4 dist/CiteBar.app/Contents/Frameworks/Sparkle.framework/Versions/B/Sparkle
          echo
          echo "Gatekeeper pre-notarization assessment:"
          spctl -a -vvv -t exec dist/CiteBar.app || true
        } 2>&1 | tee dist/notary-logs/signing-diagnostics.txt

    - name: Notarize and staple DMG
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
        NOTARY_TIMEOUT_SECONDS: 3600
      run: |
        scripts/notarize-dmg.sh "dist/${{ steps.dmg_name.outputs.DMG_NAME }}.dmg"

    - name: Upload notarization diagnostics
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: notarization-diagnostics-${{ steps.get_version.outputs.TAG }}
        path: |
          dist/notary-logs/**
        if-no-files-found: warn
        retention-days: 14

    - name: Build Sparkle sign_update tool
      run: |
        xcodebuild -project .build/checkouts/Sparkle/Sparkle.xcodeproj \
          -scheme sign_update \
          -configuration Release \
          -derivedDataPath .build/sparkle-tools \
          CODE_SIGNING_ALLOWED=NO
        
        SIGN_UPDATE_BIN=".build/sparkle-tools/Build/Products/Release/sign_update"
        if [ ! -x "$SIGN_UPDATE_BIN" ]; then
          echo "Error: sign_update tool was not built at expected path: $SIGN_UPDATE_BIN"
          exit 1
        fi
        
        echo "SIGN_UPDATE_BIN=$SIGN_UPDATE_BIN" >> $GITHUB_ENV
        
    - name: Generate Appcast
      env:
        SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
      run: |
        # Get file size and calculate SHA256
        DMG_FILE="dist/${{ steps.dmg_name.outputs.DMG_NAME }}.dmg"
        DMG_SIZE=$(stat -f%z "$DMG_FILE")
        DMG_SHA256=$(shasum -a 256 "$DMG_FILE" | cut -d' ' -f1)
        CURRENT_DATE=$(date -u +"%a, %d %b %Y %H:%M:%S %Z")
        
        # Sign DMG with Sparkle EdDSA private key
        ED_SIGNATURE=$(printf "%s" "$SPARKLE_PRIVATE_KEY" | "$SIGN_UPDATE_BIN" --ed-key-file - -p "$DMG_FILE")
        
        # Verify generated signature to fail fast on malformed keys
        "$SIGN_UPDATE_BIN" --verify --ed-key-file - "$DMG_FILE" "$ED_SIGNATURE" <<< "$SPARKLE_PRIVATE_KEY"
        
        # Generate release notes from AppVersion.swift
        RELEASE_NOTES_HTML=$(swift scripts/extract-release-notes.swift html)
        
        # Create appcast.xml
        cat > appcast.xml << EOF
        <?xml version="1.0" encoding="utf-8"?>
        <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
          <channel>
            <title>CiteBar</title>
            <description>Citation Tracking for Academics</description>
            <language>en</language>
            <link>https://github.com/hichipli/CiteBar</link>
            <item>
              <title>Version ${{ steps.dmg_name.outputs.VERSION_FROM_FILE }}</title>
              <link>https://github.com/hichipli/CiteBar/releases/latest</link>
              <pubDate>$CURRENT_DATE</pubDate>
              <description><![CDATA[
                $RELEASE_NOTES_HTML
              ]]></description>
              <sparkle:informationalUpdate>
                <sparkle:belowVersion>${{ steps.dmg_name.outputs.MANUAL_UPGRADE_BASELINE_BUILD_FROM_FILE }}</sparkle:belowVersion>
              </sparkle:informationalUpdate>
              <enclosure url="https://github.com/hichipli/CiteBar/releases/download/${{ steps.get_version.outputs.TAG }}/${{ steps.dmg_name.outputs.DMG_NAME }}.dmg"
                         sparkle:version="${{ steps.dmg_name.outputs.BUILD_VERSION_FROM_FILE }}"
                         sparkle:shortVersionString="${{ steps.dmg_name.outputs.VERSION_FROM_FILE }}"
                         sparkle:edSignature="$ED_SIGNATURE"
                         sparkle:sha256Sum="$DMG_SHA256"
                         length="$DMG_SIZE"
                         type="application/octet-stream" />
              <sparkle:minimumSystemVersion>13.0</sparkle:minimumSystemVersion>
            </item>
          </channel>
        </rss>
        EOF
        
    - name: Create Release
      run: |
        # Generate release notes from AppVersion.swift
        RELEASE_NOTES_MARKDOWN=$(swift scripts/extract-release-notes.swift markdown)
        echo "$RELEASE_NOTES_MARKDOWN" > release-notes.md

    - name: Upload dry-run release artifacts
      if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}
      uses: actions/upload-artifact@v4
      with:
        name: citebar-${{ steps.dmg_name.outputs.VERSION_FROM_FILE }}-dry-run-release
        path: |
          dist/${{ steps.dmg_name.outputs.DMG_NAME }}.dmg
          appcast.xml
          release-notes.md
          dist/notary-logs/**
        if-no-files-found: error
        retention-days: 14
        
    - name: Publish Release
      if: ${{ github.event_name == 'push' || inputs.dry_run == false }}
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.get_version.outputs.TAG }}
        name: CiteBar ${{ steps.dmg_name.outputs.VERSION_FROM_FILE }}
        body_path: release-notes.md
        draft: false
        prerelease: false
        files: |
          dist/${{ steps.dmg_name.outputs.DMG_NAME }}.dmg
          appcast.xml
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
